version: '3.8'

services:
  postgres_db:
    image: postgres:16  
    container_name: i2i_postgres_container
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5433:5432"     
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: